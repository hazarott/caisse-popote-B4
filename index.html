function _optionalChain(ops) { let lastAccessLHS = undefined; let value = ops[0]; let i = 1; while (i < ops.length) { const op = ops[i]; const fn = ops[i + 1]; i += 2; if ((op === ‘optionalAccess’ || op === ‘optionalCall’) && value == null) { return undefined; } if (op === ‘access’ || op === ‘optionalAccess’) { lastAccessLHS = value; value = fn(value); } else if (op === ‘call’ || op === ‘optionalCall’) { value = fn((…args) => value.call(lastAccessLHS, …args)); lastAccessLHS = undefined; } } return value; }

const SB_HDR = {
“Content-Type”: “application/json”,
“apikey”: SB_KEY,
“Authorization”: “Bearer “ + SB_KEY,
};

async function dbGet(table) {
const r = await fetch(SB_URL + “/rest/v1/” + table + “?select=*”, { headers: SB_HDR });
if (!r.ok) throw new Error(await r.text());
return r.json();
}
async function dbUpsert(table, rows) {
const r = await fetch(SB_URL + “/rest/v1/” + table, {
method: “POST”,
headers: { …SB_HDR, “Prefer”: “resolution=merge-duplicates,return=representation” },
body: JSON.stringify(rows),
});
if (!r.ok) throw new Error(await r.text());
return r.json();
}
async function dbPatch(table, id, data) {
const r = await fetch(SB_URL + “/rest/v1/” + table + “?id=eq.” + id, {
method: “PATCH”,
headers: { …SB_HDR, “Prefer”: “return=representation” },
body: JSON.stringify(data),
});
if (!r.ok) throw new Error(await r.text());
return r.json();
}
async function dbDelete(table, id) {
const r = await fetch(SB_URL + “/rest/v1/” + table + “?id=eq.” + id, {
method: “DELETE”, headers: SB_HDR,
});
if (!r.ok) throw new Error(await r.text());
}
function dbListen(table, cb) {
const ws = new WebSocket(
SB_URL.replace(“https://”, “wss://”) +
“/realtime/v1/websocket?apikey=” + SB_KEY + “&vsn=1.0.0”
);
ws.onopen = () => ws.send(JSON.stringify({
topic: “realtime:public:” + table, event: “phx_join”, payload: {}, ref: “1”
}));
ws.onmessage = (e) => {
try {
const m = JSON.parse(e.data);
if (m.event === “INSERT” || m.event === “UPDATE” || m.event === “DELETE”) {
cb(m.event, m.payload && (m.payload.record || m.payload.old_record));
}
} catch (_) {}
};
ws.onerror = () => {};
return () => ws.close();
}

function Badge({ children, color }) {
const c = {
red:    “bg-red-100 text-red-700 border-red-200”,
orange: “bg-orange-100 text-orange-700 border-orange-200”,
gray:   “bg-slate-100 text-slate-500 border-slate-200”,
green:  “bg-emerald-100 text-emerald-700 border-emerald-200”,
};
return React.createElement(‘span’, { className: “text-xs font-bold px-2 py-0.5 rounded-full border “ + (c[color] || c.gray),}, children);
}

function Toast({ msg, type, onClose }) {
useEffect(() => { const t = setTimeout(onClose, 3500); return () => clearTimeout(t); }, [onClose]);
const bg = type === “success” ? “bg-emerald-500” : type === “error” ? “bg-red-500” : “bg-sky-500”;
return (
React.createElement(‘div’, { className: “fixed top-4 right-4 z-50 “ + bg + “ text-white px-5 py-3 rounded-2xl shadow-xl flex items-center gap-3”,
style: { animation: “slideInRight 0.25s ease” },}
, React.createElement(‘span’, null, type === “success” ? “✅” : type === “error” ? “❌” : “ℹ️”)

, React.createElement(‘button’, { onClick: onClose, className: “ml-2 opacity-60 hover:opacity-100 text-xl leading-none”    ,}, “×”)
)
);
}

, children

)

}
